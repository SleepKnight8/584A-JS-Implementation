<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>584A JS Implementation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>584A JS Implementation</h2>

    <p class="subtitle">
        A JavaScript implementation of the <strong>Codeforces 584A – Olesya and Rodion</strong> problem.
        Enter the required length (<strong>n</strong>) and divisor (<strong>t</strong>) to watch the algorithm construct a valid number step by step.
    </p>

    <div class="input-group">
        <label for="length">Length</label>
        <input
            id="length"
            min="1"
            max="100"
            placeholder="Enter a number">
    </div>

    <div class="input-group">
        <label for="digit">Divisor</label>
        <input
            id="digit"
            min="2"
            max="10"
            placeholder="Enter a number">
    </div>

    <button id="generate-btn" onclick="base_num()">
        Solve
    </button>

    <div class="output">
        <h2>solution</h2>
        <p id="result"></p>
    </div>
</div>

<script src="index.js"></script>

</body>
</html>
